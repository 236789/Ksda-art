<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ADEVAR SAU PROVOCARE KSDA</title>
    <!-- Font Artistic -->
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Orbitron:wght@600&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-pink: #ff00ff;
            --glass: rgba(0, 0, 0, 0.85);
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Arial', sans-serif;
            color: white; overflow: hidden;
            background: #000 url('https://files.oaiusercontent.com/file-7nKxS7nKxS7nKxS7nKxS7nKx') no-repeat center center fixed;
            background-size: cover;
        }

        /* TITLU ARTISTIC */
        #main-header {
            text-align: center;
            padding: 15px;
            font-family: 'Permanent Marker', cursive;
            font-size: 2.5em;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 10px rgba(255, 0, 255, 0.3);
        }

        /* MODAL REGULAMENT */
        #age-gate {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.98); display: flex;
            justify-content: center; align-items: center; z-index: 9999;
        }
        .modal-content {
            background: #111; padding: 35px; border-radius: 30px;
            max-width: 450px; width: 90%; text-align: center;
            border: 2px solid var(--neon-pink); box-shadow: 0 0 40px var(--neon-pink);
            font-family: 'Orbitron', sans-serif;
        }
        .btn-start {
            background: linear-gradient(45deg, var(--neon-pink), var(--neon-blue));
            color: white; border: none; padding: 18px 40px;
            font-size: 1.4em; font-weight: bold; cursor: pointer;
            border-radius: 50px; width: 100%; margin-top: 20px;
        }

        /* CONTAINER JOC */
        #game-container {
            display: none; height: calc(100vh - 100px);
            flex-direction: row; justify-content: space-evenly;
            align-items: center; padding: 10px; box-sizing: border-box;
        }

        /* CĂSUȚELE JUCĂTORILOR */
        .player-box {
            width: 42%; height: 82vh;
            background: var(--glass);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px; display: flex; flex-direction: column;
            position: relative; transition: 0.5s;
        }

        .active-turn {
            border: 3px solid var(--neon-blue);
            box-shadow: 0 0 30px var(--neon-blue);
        }

        /* WEBCAM IN COLT (Micșorat) */
        .video-corner {
            position: absolute; top: 20px; right: 20px;
            width: 120px; height: 120px; background: #000;
            border-radius: 15px; border: 2px solid var(--neon-pink);
            overflow: hidden; z-index: 10;
        }
        video { width: 100%; height: 100%; object-fit: cover; }
        .cam-toggle {
            position: absolute; bottom: 0; width: 100%;
            background: rgba(255, 0, 255, 0.7); border: none;
            color: white; font-size: 9px; cursor: pointer; padding: 2px;
        }

        /* ZONA DE CHAT (Mărită) */
        .chat-area {
            flex-grow: 1; overflow-y: auto; padding: 25px;
            display: flex; flex-direction: column; gap: 15px;
            margin-top: 10px;
        }
        .msg-received {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 15px; border-radius: 15px;
            max-width: 80%; border-left: 3px solid var(--neon-pink);
        }
        .chat-area img { max-width: 200px; border-radius: 10px; border: 1px solid var(--neon-blue); }
        audio { max-width: 100%; height: 35px; }

        /* BARA DE CONTROL */
        .controls {
            padding: 20px; background: #0a0a0a;
            border-radius: 0 0 40px 40px; display: flex;
            align-items: center; gap: 15px; border-top: 1px solid #222;
        }
        .text-input {
            flex-grow: 1; background: #1a1a1a; border: 1px solid #333;
            color: white; padding: 12px; border-radius: 12px; outline: none;
        }
        .icon-btn { background: none; border: none; color: white; font-size: 1.6em; cursor: pointer; }
        .recording { color: #ff0000; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.3; } }

        /* MENIU CENTRAL */
        #central-ui { width: 10%; display: flex; flex-direction: column; gap: 15px; }
        .btn-game {
            padding: 12px; border: none; border-radius: 12px;
            font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 0.7em;
            font-family: 'Orbitron', sans-serif;
        }
        .btn-t { background: var(--neon-blue); color: #000; }
        .btn-d { background: var(--neon-pink); color: #fff; }
        .btn-n { background: #ffea00; color: #000; }

        @media (max-width: 850px) {
            #game-container { flex-direction: column; overflow-y: auto; }
            .player-box { width: 95%; height: 45vh; margin-bottom: 10px; }
            #central-ui { width: 95%; flex-direction: row; margin: 10px 0; }
            #main-header { font-size: 1.5em; }
            .video-corner { width: 80px; height: 80px; }
        }
    </style>
</head>
<body>

    <div id="main-header">ADEVAR SAU PROVOCARE KSDA</div>

    <!-- MODAL INCEPUT -->
    <div id="age-gate">
        <div class="modal-content">
            <h2 style="color:var(--neon-blue)">KSDArt.com</h2>
            <p style="text-align: left; font-size: 0.9em;">
                ✓ Peste 18 ani impliniți.<br>
                ✓ Sinceritate în joc.<br>
                ✓ Acces Cameră și Microfon real.<br>
                ✓ Trimitere Media (Foto/Video/Audio).
            </p>
            <button class="btn-start" onclick="startKSDA()">ÎNCEPE JOCUL</button>
        </div>
    </div>

    <!-- ECRAN JOC -->
    <div id="game-container">
        
        <!-- JUCĂTOR 1 (TU) -->
        <div id="box1" class="player-box active-turn">
            <div class="video-corner">
                <video id="v1" autoplay playsinline muted style="transform: scaleX(-1);"></video>
                <button class="cam-toggle" onclick="toggleCam()">ON/OFF CAM</button>
            </div>
            <div class="chat-area" id="log1">
                <div style="font-size: 10px; color: #444;">Mesajele de la partener vor apărea aici.</div>
            </div>
            <div class="controls">
                <button class="icon-btn" id="mic-btn" onclick="handleMic()">🎙️</button>
                <input type="text" class="text-input" id="msg-in" placeholder="Scrie...">
                <label class="icon-btn">
                    📷 <input type="file" style="display:none" accept="image/*,video/*" onchange="sendMedia(this)">
                </label>
            </div>
        </div>

        <!-- MENU -->
        <div id="central-ui">
            <button class="btn-game btn-t" onclick="sendChoice('Adevăr')">Adevăr</button>
            <button class="btn-game btn-d" onclick="sendChoice('Provocare')">Provocare</button>
            <button class="btn-game btn-n" onclick="swap()">Rândul</button>
        </div>

        <!-- JUCĂTOR 2 (PARTENER) -->
        <div id="box2" class="player-box">
            <div class="video-corner">
                <div style="position:absolute; top:40%; left:10%; font-size:8px; color:#333">Așteptare...</div>
                <video id="v2" autoplay playsinline></video>
            </div>
            <div class="chat-area" id="log2">
                <div style="font-size: 10px; color: #444;">Partenerul vede ce îi trimiți tu aici.</div>
            </div>
            <div class="controls" style="opacity: 0.3;">
                <button class="icon-btn" disabled>🎙️</button>
                <input type="text" class="text-input" disabled placeholder="...">
                <button class="icon-btn" disabled>📷</button>
            </div>
        </div>

    </div>

    <script>
        let turn = 1;
        let myStream;
        let mediaRecorder;
        let audioChunks = [];

        async function startKSDA() {
            try {
                myStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById('v1').srcObject = myStream;
                document.getElementById('age-gate').style.display = 'none';
                document.getElementById('game-container').style.display = 'flex';
                setupRecorder();
            } catch (err) {
                alert("Te rugăm să permiți accesul la cameră pentru KSDArt.com!");
            }
        }

        function toggleCam() {
            let track = myStream.getVideoTracks()[0];
            track.enabled = !track.enabled;
        }

        // --- MICROFON REAL ---
        function setupRecorder() {
            mediaRecorder = new MediaRecorder(myStream);
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = () => {
                const blob = new Blob(audioChunks, { type: 'audio/ogg; codecs=opus' });
                const url = URL.createObjectURL(blob);
                const log2 = document.getElementById('log2');
                log2.innerHTML += `<div class="msg-received"><b>Audio de la partener:</b><br><audio src="${url}" controls></audio></div>`;
                log2.scrollTop = log2.scrollHeight;
                audioChunks = [];
            };
        }

        function handleMic() {
            const btn = document.getElementById('mic-btn');
            if (mediaRecorder.state === "inactive") {
                mediaRecorder.start();
                btn.classList.add('recording');
            } else {
                mediaRecorder.stop();
                btn.classList.remove('recording');
            }
        }

        // --- MEDIA (POZE TRIMITERE LA PARTENER) ---
        function sendMedia(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => {
                    const log2 = document.getElementById('log2');
                    let content = input.files[0].type.includes('image') ? 
                        `<img src="${e.target.result}">` : 
                        `<video src="${e.target.result}" controls style="max-width:200px"></video>`;
                    log2.innerHTML += `<div class="msg-received"><b>Media primită:</b><br>${content}</div>`;
                    log2.scrollTop = log2.scrollHeight;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        // --- BUTOANE DECIZIE ---
        function sendChoice(type) {
            const log2 = document.getElementById('log2');
            log2.innerHTML += `<div class="msg-received" style="border-left-color:var(--neon-blue)">📢 <b>Partenerul a ales: ${type.toUpperCase()}!</b></div>`;
            log2.scrollTop = log2.scrollHeight;
        }

        function swap() {
            turn = (turn === 1) ? 2 : 1;
            document.getElementById('box1').classList.toggle('active-turn', turn === 1);
            document.getElementById('box2').classList.toggle('active-turn', turn === 2);
        }

        // CHAT TEXT CATRE PARTENER
        document.getElementById('msg-in').addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && this.value.trim() !== "") {
                const log2 = document.getElementById('log2');
                log2.innerHTML += `<div class="msg-received"><b>Mesaj:</b> ${this.value}</div>`;
                this.value = "";
                log2.scrollTop = log2.scrollHeight;
            }
        });
    </script>
</body>
</html>
