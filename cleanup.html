<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KSDA Database Restoration Tool</title>
    <style>
        body { background: #111; color: #fff; font-family: sans-serif; padding: 30px; }
        .log-box { background: #000; border: 1px solid #333; padding: 15px; height: 400px; overflow-y: scroll; font-family: monospace; margin-top: 20px; }
        .btn { padding: 15px 30px; font-weight: bold; cursor: pointer; border: none; border-radius: 5px; margin-right: 10px; }
        .btn-blue { background: #29f3ff; color: #000; }
        .btn-red { background: #ff4757; color: #fff; }
        .stat { color: #aaa; font-size: 14px; }
    </style>
</head>
<body>

    <h1>🚑 KSDA EMERGENCY RESTORE</h1>
    <p>This tool attempts to calculate real data from history arrays and resets economy to a safe baseline.</p>
    
    <div>
        <label>Base Coins for Everyone:</label>
        <input type="number" id="baseCoins" value="2500" style="padding:5px;">
        
        <label>Base Diamonds for Everyone:</label>
        <input type="number" id="baseDiamonds" value="50" style="padding:5px;">
    </div>
    <br>

    <button id="loginBtn" class="btn btn-blue">1. Login Owner</button>
    <button id="runBtn" class="btn btn-red" style="display:none;">2. EXECUTE RESTORE</button>

    <div id="logger" class="log-box">Waiting for login...</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, getDocs, writeBatch, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDoH80kffNrzFAcyRqsTVdifs-whUhwH9A",
            authDomain: "ksda-7546f.firebaseapp.com",
            projectId: "ksda-7546f",
            storageBucket: "ksda-7546f.firebasestorage.app",
            messagingSenderId: "306437513808",
            appId: "1:306437513808:web:28479810e3fdf71b32e755"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const logger = document.getElementById('logger');

        function log(msg, color = "#fff") {
            const div = document.createElement('div');
            div.style.color = color;
            div.innerHTML = `> ${msg}`;
            logger.appendChild(div);
            logger.scrollTop = logger.scrollHeight;
        }

        document.getElementById('loginBtn').onclick = async () => {
            try {
                const provider = new GoogleAuthProvider();
                const res = await signInWithPopup(auth, provider);
                if(res.user.email === 'nicaemmanuel433qe@gmail.com') {
                    log("✅ ACCESS GRANTED: OWNER DETECTED", "#00ff88");
                    document.getElementById('runBtn').style.display = 'inline-block';
                    document.getElementById('loginBtn').style.display = 'none';
                } else {
                    log("⛔ ACCESS DENIED: NOT OWNER", "red");
                }
            } catch(e) { log(e.message, "red"); }
        };

        document.getElementById('runBtn').onclick = async () => {
            const baseCoins = parseInt(document.getElementById('baseCoins').value);
            const baseDiamonds = parseInt(document.getElementById('baseDiamonds').value);

            if(!confirm(`⚠️ WARNING ⚠️\n\nThis will:\n1. Set EVERY user to ${baseCoins} Coins & ${baseDiamonds} Diamonds.\n2. Recalculate Invites/Donations based on history arrays.\n3. Reset Streaks to 0.\n\nProceed?`)) return;

            log("🚀 STARTING DATABASE REPAIR...", "yellow");

            try {
                const snapshot = await getDocs(collection(db, "accounts"));
                const total = snapshot.size;
                log(`📂 Loaded ${total} accounts.`);

                let batch = writeBatch(db);
                let count = 0;
                let batchIndex = 0;

                snapshot.forEach(docSnap => {
                    const data = docSnap.data();
                    let updates = {};

                    // 1. ECONOMY RESET (The Clean Slate)
                    // We overwrite whatever hacked number is there with the base amount
                    updates.coins = baseCoins;
                    updates.diamonds = baseDiamonds;
                    
                    // 2. STREAK RESET (Cannot be recovered)
                    updates.streak = 0; 

                    // 3. SMART RECOVERY: REFERRALS
                    // Hackers change the number, but usually leave the array alone.
                    // We count the actual items in the array to get the real number.
                    if (Array.isArray(data.referralHistory)) {
                        updates.totalReferrals = data.referralHistory.length;
                    } else {
                        updates.totalReferrals = 0;
                    }

                    // 4. SMART RECOVERY: DONATIONS
                    // We sum up the actual donations from history
                    if (Array.isArray(data.donationHistory)) {
                        let realTotal = 0;
                        data.donationHistory.forEach(d => {
                            if(d.amount) realTotal += parseInt(d.amount);
                        });
                        updates.totalCoinsDonated = realTotal;
                    } else {
                        updates.totalCoinsDonated = 0;
                    }

                    // Add to batch
                    batch.update(docSnap.ref, updates);
                    count++;

                    if (count >= 400) {
                        batch.commit();
                        batch = writeBatch(db);
                        count = 0;
                        batchIndex++;
                        log(`💾 Saved Batch ${batchIndex}...`, "#00ffff");
                    }
                });

                if (count > 0) await batch.commit();
                
                log("✅ REPAIR COMPLETE.", "#00ff88");
                log("All fake millions removed.", "#00ff88");
                log("Real Invite/Donation counts restored (if history existed).", "#00ff88");

            } catch(e) {
                log("❌ ERROR: " + e.message, "red");
            }
        };
    </script>
</body>
</html>
