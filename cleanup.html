<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KSDA Full System Restore</title>
    <style>
        body { background: #050b14; color: #00ff88; font-family: 'Courier New', monospace; padding: 30px; }
        .log-box { background: #000; border: 1px solid #333; padding: 15px; height: 400px; overflow-y: scroll; margin-top: 20px; color: #ccc; }
        .btn { padding: 15px 30px; font-weight: bold; cursor: pointer; border: none; border-radius: 5px; margin-right: 10px; font-size: 16px; text-transform: uppercase; }
        .btn-blue { background: #29f3ff; color: #000; }
        .btn-red { background: #ff4757; color: #fff; box-shadow: 0 0 15px #ff4757; }
        input { padding: 10px; background: #111; border: 1px solid #444; color: #fff; border-radius: 5px; }
        h1 { color: #ff4757; text-shadow: 0 0 10px #ff4757; }
    </style>
</head>
<body>

    <h1>☢️ KSDA DISASTER RECOVERY V2</h1>
    <p>This tool will standardize economy, repair invite counts, and <b>UNEQUIP all hacked cosmetics</b>.</p>
    
    <div style="background: rgba(255,255,255,0.05); padding: 20px; border-radius: 10px; max-width: 600px;">
        <h3>1. Compensation Settings</h3>
        <label>Set Coins to:</label>
        <input type="number" id="baseCoins" value="2500">
        
        <label>Set Diamonds to:</label>
        <input type="number" id="baseDiamonds" value="50">
    </div>
    <br>

    <button id="loginBtn" class="btn btn-blue">LOG IN OWNER</button>
    <button id="runBtn" class="btn btn-red" style="display:none;">⚠️ EXECUTE WIPE & RESTORE</button>

    <div id="logger" class="log-box">Waiting for authentication...</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, getDocs, writeBatch } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyDoH80kffNrzFAcyRqsTVdifs-whUhwH9A",
            authDomain: "ksda-7546f.firebaseapp.com",
            projectId: "ksda-7546f",
            storageBucket: "ksda-7546f.firebasestorage.app",
            messagingSenderId: "306437513808",
            appId: "1:306437513808:web:28479810e3fdf71b32e755"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const logger = document.getElementById('logger');

        function log(msg, color = "#ccc") {
            const div = document.createElement('div');
            div.style.color = color;
            div.innerHTML = `> ${msg}`;
            logger.appendChild(div);
            logger.scrollTop = logger.scrollHeight;
        }

        document.getElementById('loginBtn').onclick = async () => {
            try {
                const provider = new GoogleAuthProvider();
                const res = await signInWithPopup(auth, provider);
                if(res.user.email === 'nicaemmanuel433qe@gmail.com') {
                    log("✅ OWNER VERIFIED.", "#00ff88");
                    document.getElementById('runBtn').style.display = 'inline-block';
                    document.getElementById('loginBtn').style.display = 'none';
                } else {
                    log("⛔ ACCESS DENIED.", "red");
                }
            } catch(e) { log(e.message, "red"); }
        };

        document.getElementById('runBtn').onclick = async () => {
            const baseCoins = parseInt(document.getElementById('baseCoins').value);
            const baseDiamonds = parseInt(document.getElementById('baseDiamonds').value);

            if(!confirm(`⚠️ FINAL WARNING ⚠️\n\n1. Reset Coins/Diamonds to ${baseCoins}/${baseDiamonds}\n2. Recalculate Invites from history\n3. UNEQUIP ALL Badges/Banners/Frames\n4. Reset Streak to 0\n\nThis affects EVERY user. Continue?`)) return;

            log("🚀 STARTING GLOBAL REPAIR...", "#ffd700");

            try {
                const snapshot = await getDocs(collection(db, "accounts"));
                log(`📂 Scanning ${snapshot.size} users...`);

                let batch = writeBatch(db);
                let count = 0;
                let batchIndex = 0;

                snapshot.forEach(docSnap => {
                    const data = docSnap.data();
                    let updates = {};

                    // --- 1. ECONOMY RESET ---
                    updates.coins = baseCoins;
                    updates.diamonds = baseDiamonds;
                    updates.streak = 0; 

                    // --- 2. COSMETIC WIPE (THE FIX YOU ASKED FOR) ---
                    // We set these to null. The user still owns them in "ownedBadges", 
                    // but they are taken off the profile.
                    updates.equippedBadge = null; 
                    updates.equippedBanner = null; 
                    updates.equippedFrame = null; 
                    updates.equippedText = null;

                    // --- 3. RECALCULATE INVITES (Smart Fix) ---
                    if (Array.isArray(data.referralHistory)) {
                        updates.totalReferrals = data.referralHistory.length;
                    } else {
                        updates.totalReferrals = 0;
                    }

                    // --- 4. RECALCULATE DONATIONS (Smart Fix) ---
                    if (Array.isArray(data.donationHistory)) {
                        let realTotal = 0;
                        data.donationHistory.forEach(d => {
                            if(d.amount) realTotal += parseInt(d.amount);
                        });
                        updates.totalCoinsDonated = realTotal;
                    } else {
                        updates.totalCoinsDonated = 0;
                    }

                    batch.update(docSnap.ref, updates);
                    count++;

                    // Commit in chunks of 400
                    if (count >= 400) {
                        batch.commit();
                        batch = writeBatch(db);
                        count = 0;
                        batchIndex++;
                        log(`💾 Saved Batch ${batchIndex}...`, "#29f3ff");
                    }
                });

                if (count > 0) await batch.commit();
                
                log("✅ REPAIR COMPLETE.", "#00ff88");
                log("💰 Coins/Diamonds standardized.", "#00ff88");
                log("🎨 All hacked cosmetics UNEQUIPPED.", "#00ff88");
                log("👥 Real invite counts restored.", "#00ff88");

            } catch(e) {
                log("❌ ERROR: " + e.message, "red");
            }
        };
    </script>
</body>
</html>
