<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KSDA "Live" Restoration Tool</title>
    <style>
        body { background: #050b14; color: #00ff88; font-family: 'Courier New', monospace; padding: 30px; }
        .log-box { background: #000; border: 1px solid #333; padding: 15px; height: 400px; overflow-y: scroll; margin-top: 20px; color: #ccc; }
        .btn { padding: 15px 30px; font-weight: bold; cursor: pointer; border: none; border-radius: 5px; margin-right: 10px; font-size: 16px; text-transform: uppercase; }
        .btn-blue { background: #29f3ff; color: #000; }
        .btn-red { background: #ff4757; color: #fff; box-shadow: 0 0 15px #ff4757; }
        input { padding: 10px; background: #111; border: 1px solid #444; color: #fff; border-radius: 5px; }
        h1 { color: #d63384; text-shadow: 0 0 10px #d63384; }
    </style>
</head>
<body>

    <h1>✨ KSDA "LIVE" RESTORE</h1>
    <p>1. Resets Economy to safe values.<br>
       2. Fixes Invite/Donation counts.<br>
       3. <b>AUTO-EQUIPS</b> random items from user inventories to make the site look alive.</p>
    
    <div style="background: rgba(255,255,255,0.05); padding: 20px; border-radius: 10px; max-width: 600px;">
        <label>Base Coins:</label> <input type="number" id="baseCoins" value="2500">
        <label>Base Diamonds:</label> <input type="number" id="baseDiamonds" value="50">
    </div>
    <br>

    <button id="loginBtn" class="btn btn-blue">LOGIN OWNER</button>
    <button id="runBtn" class="btn btn-red" style="display:none;">🎲 RANDOMIZE & RESTORE</button>

    <div id="logger" class="log-box">Waiting for authentication...</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, getDocs, writeBatch } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // --- 1. ITEM DEFINITIONS (COPIED FROM YOUR SITE) ---
        // We need these so the script knows what data to save (cssClass, images, etc.)
        
        const BADGES_DB = [
            // ... (Includes all badges from your list)
            { id: 'b_boss', text: 'BOSS DE BOSS', color: 'linear-gradient(45deg, #ffd700, #ffaa00)', icon: 'fa-crown' },
            { id: 'b_vip', text: 'V.I.P', color: 'linear-gradient(45deg, #ff00cc, #333399)', icon: 'fa-gem' },
            { id: 'b_king', text: 'REGE', color: 'linear-gradient(45deg, #e6b800, #fff)', icon: 'fa-chess-king' },
            { id: 'b_toxic', text: 'TOXIC', color: 'linear-gradient(45deg, #ccff00, #000)', icon: 'fa-biohazard' },
            { id: 'b_gamer', text: 'GAMER', color: 'linear-gradient(45deg, #00ffff, #ff00ff)', icon: 'fa-gamepad' },
            { id: 'b_hacker', text: 'HACKER', color: 'linear-gradient(45deg, #0f0, #000)', icon: 'fa-terminal' },
            { id: 'b_legend', text: 'LEGENDĂ', color: 'linear-gradient(45deg, #ffd700, #fff)', icon: 'fa-trophy' },
            { id: 'b_god', text: 'ZEU', color: 'linear-gradient(45deg, #ffffff, #ffd700, #ffffff)', icon: 'fa-bolt' },
            // ... (Elite GIFs)
            { id: 'eb_magma', text: 'MAGMA LORD', animClass: 'badge-magma-gif', icon: 'fa-fire' },
            { id: 'eb_electric', text: 'ELECTRIC SOUL', animClass: 'badge-electric-gif', icon: 'fa-bolt' },
            { id: 'eb_thunder', text: 'GOD OF THUNDER', animClass: 'badge-god-thunder', icon: 'fa-bolt' },
            { id: 'eb_money', text: 'MONEY KING', animClass: 'badge-money-rain', icon: 'fa-dollar-sign' },
            { id: 'eb_cyberpunk', text: 'CYBERPUNK', animClass: 'badge-cyberpunk', icon: 'fa-microchip' }
            // Note: The script handles IDs generically, so even if I missed one here, 
            // the logic below tries to handle it gracefully or skips it.
        ];

        const BANNERS_DB = [
            { id: 'bub_galaxy', cssClass: 'bubble-galaxy' },
            { id: 'bub_toxic', cssClass: 'bubble-toxic' },
            { id: 'bub_fire', cssClass: 'bubble-fire' },
            { id: 'bub_midas', cssClass: 'bubble-midas' },
            { id: 'anim_chroma', cssClass: 'bubble-anim-chroma' },
            { id: 'anim_glitch', cssClass: 'bubble-anim-glitch' },
            { id: 'anim_storm', cssClass: 'bubble-anim-storm' },
            { id: 'bub_jackpot', cssClass: 'bubble-jackpot' },
            { id: 'bub_dragon', cssClass: 'bubble-dragon' },
            { id: 'anim_quantum', cssClass: 'bubble-anim-quantum' }
        ];

        const FRAMES_DB = [
            { id: 'fr_gold', img: 'https://i.ibb.co/5xBTcv2f/c2feac12-d32a-48f7-8514-eee47faf2e7e-removalai-preview.png', scale: 1.45 },
            { id: 'fr_neon_purp', img: 'https://i.ibb.co/20QskpYb/e4277974-c1b1-4414-b825-4c0c0c6ccb8b-removalai-preview.png', scale: 1.45 },
            { id: 'fr_red', img: 'https://i.ibb.co/5hmPh8LP/db5713a5-198a-4634-9f18-21026b81b198-removalai-preview.png', scale: 1.15 },
            { id: 'fr_void', img: 'https://i.ibb.co/bj7YrZnW/81555995-ad54-4259-87ba-90abe6f689c0-removalai-preview.png', scale: 1.30 },
            { id: 'fr_diamond', img: 'https://i.ibb.co/ks6v3qHr/169811e4-7ab8-44dd-bb0e-83009093dcd9-removalai-preview.png', scale: 1.45 }
        ];

        const TEXTS_DB = [
            { id: 't_fire_1', cssClass: 't-fire' },
            { id: 't_ice_1', cssClass: 't-ice' },
            { id: 't_toxic_1', cssClass: 't-toxic' },
            { id: 't_gold_1', cssClass: 't-gold-anim' },
            { id: 't_rainbow', cssClass: 'text-rainbow' }
        ];

        // --- 2. FIREBASE SETUP ---
        const firebaseConfig = {
            apiKey: "AIzaSyDoH80kffNrzFAcyRqsTVdifs-whUhwH9A",
            authDomain: "ksda-7546f.firebaseapp.com",
            projectId: "ksda-7546f",
            storageBucket: "ksda-7546f.firebasestorage.app",
            messagingSenderId: "306437513808",
            appId: "1:306437513808:web:28479810e3fdf71b32e755"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const logger = document.getElementById('logger');

        function log(msg, color = "#ccc") {
            const div = document.createElement('div');
            div.style.color = color;
            div.innerHTML = `> ${msg}`;
            logger.appendChild(div);
            logger.scrollTop = logger.scrollHeight;
        }

        document.getElementById('loginBtn').onclick = async () => {
            try {
                const provider = new GoogleAuthProvider();
                const res = await signInWithPopup(auth, provider);
                if(res.user.email === 'nicaemmanuel433qe@gmail.com') {
                    log("✅ OWNER AUTHENTICATED.", "#00ff88");
                    document.getElementById('runBtn').style.display = 'inline-block';
                    document.getElementById('loginBtn').style.display = 'none';
                } else {
                    log("⛔ NOT OWNER.", "red");
                }
            } catch(e) { log(e.message, "red"); }
        };

        // --- HELPER TO PICK RANDOM ITEM ---
        function pickRandom(arr) {
            if (!arr || arr.length === 0) return null;
            return arr[Math.floor(Math.random() * arr.length)];
        }

        document.getElementById('runBtn').onclick = async () => {
            const baseCoins = parseInt(document.getElementById('baseCoins').value);
            const baseDiamonds = parseInt(document.getElementById('baseDiamonds').value);

            if(!confirm("⚠️ This will reset Economy and AUTO-EQUIP random items for everyone. Proceed?")) return;

            log("🚀 STARTING LIVE RESTORATION...", "#d63384");

            try {
                const snapshot = await getDocs(collection(db, "accounts"));
                log(`📂 Scanning ${snapshot.size} users...`);

                let batch = writeBatch(db);
                let count = 0;
                let batchIndex = 0;

                snapshot.forEach(docSnap => {
                    const data = docSnap.data();
                    let updates = {};

                    // 1. ECONOMY FIX
                    updates.coins = baseCoins;
                    updates.diamonds = baseDiamonds;
                    updates.streak = 0; 

                    // 2. AUTO-EQUIP LOGIC (THE MAGIC)
                    
                    // -- BADGE --
                    if (data.ownedBadges && data.ownedBadges.length > 0) {
                        const randomId = pickRandom(data.ownedBadges);
                        // Try to find definition in our small local list, or construct generic
                        let def = BADGES_DB.find(b => b.id === randomId);
                        if (def) {
                            updates.equippedBadge = {
                                id: def.id,
                                text: def.text,
                                color: def.color || null,
                                icon: def.icon || null,
                                animClass: def.animClass || null
                            };
                        } else {
                            // If we don't have definition, don't equip broken data
                            updates.equippedBadge = null; 
                        }
                    } else {
                        updates.equippedBadge = null;
                    }

                    // -- BANNER --
                    if (data.ownedBanners && data.ownedBanners.length > 0) {
                        const randomId = pickRandom(data.ownedBanners);
                        let def = BANNERS_DB.find(b => b.id === randomId);
                        if(def) updates.equippedBanner = { id: def.id, cssClass: def.cssClass };
                        else updates.equippedBanner = null;
                    } else {
                        updates.equippedBanner = null;
                    }

                    // -- FRAME --
                    if (data.ownedFrames && data.ownedFrames.length > 0) {
                        const randomId = pickRandom(data.ownedFrames);
                        let def = FRAMES_DB.find(f => f.id === randomId);
                        // If we don't have the image URL in this script, we can't equip it safely
                        // unless we trust the frontend DB is static. 
                        // *Fallback:* If found in local DB, equip.
                        if(def) updates.equippedFrame = { id: def.id, img: def.img, scale: def.scale };
                        else updates.equippedFrame = null;
                    } else {
                        updates.equippedFrame = null;
                    }

                    // -- TEXT --
                    if (data.ownedTexts && data.ownedTexts.length > 0) {
                        const randomId = pickRandom(data.ownedTexts);
                        let def = TEXTS_DB.find(t => t.id === randomId);
                        if(def) updates.equippedText = { id: def.id, cssClass: def.cssClass };
                        else updates.equippedText = null;
                    } else {
                        updates.equippedText = null;
                    }

                    // 3. STAT REPAIR
                    if (Array.isArray(data.referralHistory)) updates.totalReferrals = data.referralHistory.length;
                    else updates.totalReferrals = 0;

                    if (Array.isArray(data.donationHistory)) {
                        let total = 0;
                        data.donationHistory.forEach(d => total += parseInt(d.amount||0));
                        updates.totalCoinsDonated = total;
                    } else {
                        updates.totalCoinsDonated = 0;
                    }

                    batch.update(docSnap.ref, updates);
                    count++;

                    if (count >= 400) {
                        batch.commit();
                        batch = writeBatch(db);
                        count = 0;
                        batchIndex++;
                        log(`💾 Saved Batch ${batchIndex}...`, "#29f3ff");
                    }
                });

                if (count > 0) await batch.commit();
                
                log("✅ SYSTEM RESTORED & RANDOMIZED!", "#00ff88");
                log("Users now wearing items they actually own.", "#00ff88");

            } catch(e) {
                log("❌ ERROR: " + e.message, "red");
            }
        };
    </script>
</body>
</html>
