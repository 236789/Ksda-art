  <style>
    /* ==========================================
       STILURI GLOBALE & BACKGROUND
       ========================================== */
    * { box-sizing: border-box; user-select: none; }
    body, html {
      margin: 0; padding: 0; width: 100%; height: 100%;
      background: radial-gradient(circle at center, #0f0c29, #302b63, #24243e);
      font-family: 'Oswald', sans-serif;
      overflow: hidden;
    }

    /* Particule animate pe fundal */
    .particles-container {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 1; overflow: hidden;
    }
.particle {
  position: absolute;
  top: 100vh; /* Start them at the bottom, off-screen */
  background: rgba(255, 255, 255, 0.5);
  border-radius: 50%;
  opacity: 0; /* Hidden until animation starts */
  animation: floatUp linear infinite;
  pointer-events: none;
}

@keyframes floatUp {
  0% { transform: translateY(0) scale(0); opacity: 0; }
  10% { opacity: 1; }
  90% { opacity: 1; }
  100% { transform: translateY(-110vh) scale(1); opacity: 0; }
}

    /* ==========================================
       MAIN MENU
       ========================================== */
    #mainMenu {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      width: 100%; height: 100%; z-index: 100; position: relative;
    }
    
    .logo-img {
      width: 380px; max-width: 90vw; margin-bottom: 40px; z-index: 10;
      filter: drop-shadow(0 15px 25px rgba(0,0,0,0.8));
      animation: floatLogo 4s ease-in-out infinite;
    }
    @keyframes floatLogo {
      0% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-15px) rotate(2deg); }
      100% { transform: translateY(0px) rotate(0deg); }
    }

#welcomeText {
  display: none; /* Managed by JS */
  
  /* Matches the Logo/Button vibe */
  background: linear-gradient(to bottom, #4d2600, #261300); /* Deep chocolate wood vibe */
  border: 3px solid #facc15; /* Chunky Gold border */
  border-radius: 50px; /* Fully rounded pill shape */
  
  padding: 10px 40px;
  margin-bottom: 30px;
  
  /* Text Styling */
  font-family: 'Oswald', sans-serif;
  font-size: 22px;
  font-weight: 700;
  color: #ffffff;
  text-transform: uppercase;
  letter-spacing: 1px;
  
  /* High-end shadows */
  box-shadow: 
    0 6px 0 #1a0a00,              /* 3D Depth */
    0 10px 20px rgba(0, 0, 0, 0.5); /* Shadow on floor */
    
  text-shadow: 2px 2px 0px rgba(0,0,0,0.5); /* Depth on letters */
  
  z-index: 10;
  position: relative;
  animation: plaquePop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

/* Add a small gold star icon before the name */
#welcomeText::before {
  content: "⭐";
  margin-right: 10px;
  filter: drop-shadow(0 2px 0 rgba(0,0,0,0.5));
}

@keyframes plaquePop {
  0% { transform: scale(0.5); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}

@keyframes slideInBadge {
  from { opacity: 0; transform: translateX(-50px); }
  to { opacity: 1; transform: translateX(0); }
}

@keyframes glowPulse {
  from { border-color: #0eddc1; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
  to { border-color: #ffffff; box-shadow: 0 5px 20px rgba(14, 221, 193, 0.4); }
}

    .button-container {
      display: flex; flex-direction: column; gap: 20px; justify-content: center; align-items: center; 
      z-index: 10;
    }

.menu-btn.play {
  position: relative;
  /* Rich 3-step gradient: Highlight -> Main -> Deep Orange */
  background: linear-gradient(180deg, #ffdc43 0%, #ffaa00 50%, #e67300 100%);
  
  color: #1a1c33; /* Dark text for high contrast */
  border: 4px solid #ffffff;
  border-radius: 20px;
  padding: 20px 80px;
  
  font-size: 38px;
  font-family: 'Oswald', sans-serif;
  font-weight: 800;
  text-transform: uppercase;
  cursor: pointer;
  letter-spacing: 3px;
  
  /* The "Side": Darkened burnt-orange for a heavy 3D effect */
  box-shadow: 
    0 12px 0 #4d2600,            /* Dark side of the button */
    0 20px 30px rgba(0, 0, 0, 0.5); /* Shadow on the floor */
    
  transition: all 0.1s ease;
  overflow: hidden;
}

/* --- HOVER EFFECT --- */
.menu-btn.play:hover {
  transform: translateY(-4px); /* Lift up slightly */
  filter: brightness(1.05);
  box-shadow: 
    0 16px 0 #4d2600,            /* Side gets thicker as it lifts */
    0 25px 40px rgba(0, 0, 0, 0.6);
}

/* Light sweep animation on hover */
.menu-btn.play::before {
  content: "";
  position: absolute;
  top: 0;
  left: -150%;
  width: 50%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
  transform: skewX(-20deg);
  transition: 0.6s;
}

.menu-btn.play:hover::before {
  left: 150%;
}

/* --- CLICK EFFECT --- */
.menu-btn.play:active {
  transform: translateY(10px); /* Pushes down almost to the floor */
  box-shadow: 
    0 2px 0 #4d2600,             /* Side disappears */
    0 5px 10px rgba(0, 0, 0, 0.7);
  transition: all 0.05s ease;
}

    /* Buton LOGOUT */
    #logoutBtn {
      background: transparent; color: #ff4444; border: none; font-family: 'Oswald', sans-serif;
      font-size: 18px; cursor: pointer; text-decoration: underline; display: none;
    }
    #logoutBtn:hover { color: #ff6666; }

    /* ==========================================
       MODALS (OVERLAYS)
       ========================================== */
    .modal-overlay {
      display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      background: rgba(10, 8, 30, 0.9); z-index: 99999;
      justify-content: center; align-items: center; flex-direction: column;
      backdrop-filter: blur(5px);
    }
    .modal-box {
      background: linear-gradient(to bottom, #2a2d4c, #1a1c33);
      border: 4px solid #facc15; border-radius: 20px;
      padding: 40px; text-align: center; color: white; width: 90vw; max-width: 450px;
      box-shadow: 0 0 30px rgba(250, 204, 21, 0.4), inset 0 0 20px rgba(0,0,0,0.8);
      animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    @keyframes popIn {
      0% { transform: scale(0.8); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
    .modal-box h2 { margin-top: 0; font-size: 32px; color: #facc15; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }
    .modal-box p { font-size: 18px; margin-bottom: 25px; color: #d1d5db; }

    /* Buton Login Google Customizat */
    .custom-google-btn {
      display: flex; align-items: center; justify-content: center; gap: 15px;
      width: 100%; background-color: #ffffff; color: #333333;
      border: 3px solid #cccccc; border-radius: 12px; padding: 15px 20px;
      font-size: 20px; font-family: 'Oswald', sans-serif; font-weight: 700;
      cursor: pointer; box-shadow: 0 8px 0 #999999, 0 15px 20px rgba(0, 0, 0, 0.5);
      transition: all 0.15s ease; text-transform: uppercase;

    .custom-google-btn img { width: 28px; height: 28px; }
    .custom-google-btn:hover { background-color: #f5f5f5; }
    .custom-google-btn:active {
      transform: translateY(8px);
      box-shadow: 0 0 0 #999999, 0 5px 10px rgba(0, 0, 0, 0.5);
    }

    .input-field {
      width: 100%; padding: 15px; font-size: 22px; font-family: 'Oswald', sans-serif; font-weight: 600;
      border: 3px solid #5a6288; border-radius: 12px; background: #131526; color: #0eddc1;
      text-align: center; margin-bottom: 25px; outline: none; box-shadow: inset 0 4px 6px rgba(0,0,0,0.5);
      transition: all 0.3s;
    }
    .input-field:focus { border-color: #facc15; box-shadow: inset 0 4px 6px rgba(0,0,0,0.5), 0 0 15px rgba(250, 204, 21, 0.5); }

    .cancel-btn {
      background: transparent; border: none; color: #9aa0b8; font-family: 'Oswald', sans-serif;
      font-size: 16px; margin-top: 20px; text-decoration: underline; cursor: pointer;
    }
    .cancel-btn:hover { color: #ffffff; }

    /* ==========================================
       GAME AREA
       ========================================== */
#gameArea {
  display: none; 
  position: absolute; 
  top: 0; left: 0; 
  width: 100vw; height: 100vh;
  
  /* --- BACKGROUND IMAGE SETTINGS --- */
  /* This adds a 40% dark tint so the character stands out */
  background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), 
              url('https://images.squarespace-cdn.com/content/v1/68026d02ef3401024739f55f/e7c37518-746f-42d6-9ea6-e3f7b028ffdb/ChatGPT+Image+Jun+16%2C+2025%2C+10_03_26+PM.png'); 
  
  background-size: cover;      /* Makes the image fill the whole screen */
  background-position: center; /* Centers the image */
  background-repeat: no-repeat;
  
  overflow: hidden;
  z-index: 500;
}
/* ==========================================
   PREMIUM GAMER HUD (SCOREBOARD)
   ========================================== */
#scoreBoard {
  position: absolute;
  top: 20px;
  left: 20px;
  
  /* Matches the Welcome Badge & Logo colors */
  background: linear-gradient(to bottom, #4d2600, #261300); 
  border: 3px solid #facc15;
  border-radius: 50px; /* Pill shape */
  
  display: flex;
  align-items: center;
  padding: 5px 25px 5px 10px; /* Extra padding on the right for the numbers */
  gap: 15px;
  
  box-shadow: 
    0 8px 0 #1a0a00,              /* 3D Depth */
    0 10px 20px rgba(0, 0, 0, 0.6); 
    
  z-index: 1000;
  transition: transform 0.1s ease;
}

/* THE ICON SLOT (Circular Highlight) */
.score-icon-wrapper {
  background: rgba(255, 255, 255, 0.1);
  border: 2px solid rgba(250, 204, 21, 0.5);
  border-radius: 50%;
  width: 50px;
  height: 50px;
  display: flex;
  justify-content: center;
  align-items: center;
  box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
}

.score-icon {
  height: 40px;
  filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
}

/* THE SCORE NUMBERS */
#scoreText {
  font-family: 'Orbitron', sans-serif; /* Sci-fi digital look */
  font-size: 32px;
  font-weight: 900;
  color: #ffea00; /* Bright gold */
  text-shadow: 0 0 10px rgba(255, 234, 0, 0.5), 2px 2px 0px #1a0a00;
  letter-spacing: 2px;
}

/* Label above the score */
#scoreBoard::after {
  content: "SCORE";
  position: absolute;
  top: -12px;
  left: 65px;
  background: #facc15;
  color: #1a0a00;
  font-size: 10px;
  font-weight: 900;
  padding: 2px 8px;
  border-radius: 4px;
  letter-spacing: 1px;
}

/* ANIMATION: Bumps the scoreboard when you score */
.score-bump {
  animation: scorePop 0.2s ease-out;
}

@keyframes scorePop {
  0% { transform: scale(1); }
  50% { transform: scale(1.15); }
  100% { transform: scale(1); }
}

      text-shadow: 0 0 10px #00d4ff, 0 0 20px #00d4ff, 0 0 30px #ffffff; transition: transform 1.2s ease-out, opacity 1.2s ease-out;

.custom-google-btn {
  display: flex;
  align-items: center;

/* Stil pentru iconița Google (Colorată nativ) */

.logo-container {
  position: relative;
  display: flex;
  justify-content: center;
  align-items: center;
  margin-bottom: 40px;
  z-index: 10;
}

/* MAIN LOGO: THE CRASH */
.logo-img {
  width: 380px; 
  max-width: 90vw;
  filter: drop-shadow(0 15px 25px rgba(0,0,0,0.8));
  
  /* Fall and Crash Animation */
  animation: fallAndCrash 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
}

/* V2 BADGE: THE POP */
.v2-badge {
  position: absolute;
  width: 120px;
  bottom: -20px;
  right: -10px;
  opacity: 0;
  filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5));
  
  /* Pop in after the main logo hits */
  animation: popInV2 0.6s 1.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
}

/* ANIMATION: LOGO SLAMMING DOWN */
@keyframes fallAndCrash {
  0% { transform: translateY(-1000px) scaleY(1.2); opacity: 0; }
  60% { transform: translateY(0) scaleY(0.8); opacity: 1; } /* Hits the bottom and squishes */
  75% { transform: translateY(-30px) scaleY(1.1); }          /* Bounces up */
  90% { transform: translateY(0) scaleY(1); }               /* Final impact */
  100% { transform: translateY(0) rotate(0deg); opacity: 1; }
}

/* ANIMATION: V2 STAMP POP */
@keyframes popInV2 {
  0% { transform: scale(0) rotate(-45deg); opacity: 0; }
  70% { transform: scale(1.3) rotate(10deg); opacity: 1; }
  100% { transform: scale(1) rotate(5deg); opacity: 1; }
}

/* Optional: Subtle floating effect AFTER they land */
.logo-container:hover {
    animation: gentleFloat 3s ease-in-out infinite;
}

@keyframes gentleFloat {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
}

/* ==========================================
   MAIN MENU & RESPONSIVE CONTAINER
   ========================================== */
#mainMenu {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  width: 100%;
  height: 100%;
  padding: 20px;
  gap: 20px; /* Vertical spacing between elements */
  z-index: 100;
  position: relative;
  text-align: center;
}

/* LOGO WRAPPER (For Logo + V2 Badge) */
.logo-wrapper {
  position: relative;
  display: inline-block;
  margin-bottom: 10px;
  /* Balanced shift for PC, resets on mobile */
  transform: translateX(-30px); 
  animation: logoSlamShake 0.2s 0.7s 2;
}

.logo-img {
  width: 100%;
  max-width: 400px; /* Prevents logo from being too big on PC */
  height: auto;
  filter: drop-shadow(0 15px 25px rgba(0,0,0,0.8));
  animation: crashSlam 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
}

.v2-badge {
  position: absolute;
  width: 30%; /* Scales relative to logo size */
  bottom: -5%;
  right: -10%;
  opacity: 0;
  transform: scale(4);
  filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5));
  animation: stampV2 0.5s 1.2s cubic-bezier(0.6, -0.28, 0.735, 0.045) forwards;
}

/* WELCOME BADGE */
#welcomeText {
  display: none;
  background: linear-gradient(to bottom, #4d2600, #261300);
  border: 3px solid #facc15;
  border-radius: 50px;
  padding: 8px 30px;
  
  /* Responsive Font: Min 16px, Max 22px */
  font-size: clamp(16px, 4vw, 22px); 
  font-family: 'Oswald', sans-serif;
  font-weight: 700;
  color: #ffffff;
  text-transform: uppercase;
  box-shadow: 0 6px 0 #1a0a00, 0 10px 20px rgba(0, 0, 0, 0.5);

}

/* BUTTONS CONTAINER */
.button-container {
  display: flex;
  flex-direction: column;
  gap: 15px;
  width: 100%;
  align-items: center;
}

/* PRECISE PLAY BUTTON */
.menu-btn.play {
  width: 100%;
  max-width: 280px; /* Limits width on PC */
  height: 70px;    /* Fixed height for better control */
  
  background: linear-gradient(180deg, #ffdc43 0%, #ffaa00 50%, #e67300 100%);
  color: #1a1c33;

  text-transform: uppercase;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 15px;
  
  box-shadow: 0 10px 0 #4d2600, 0 15px 25px rgba(0, 0, 0, 0.4);
  transition: all 0.1s ease;

/* LOGOUT BUTTON REDESIGN */
#logoutBtn {
  display: none; /* Managed by JS */

  justify-content: center;
  gap: 10px;
  background: linear-gradient(180deg, #ff3333 0%, #cc0000 50%, #a30000 100%);
  color: white;
  border: 3px solid #ffffff;
  border-radius: 12px;
  padding: 10px 25px;
  font-family: 'Oswald', sans-serif;

/* --- INTERACTIVITY --- */
.menu-btn.play:hover { transform: translateY(-3px); box-shadow: 0 13px 0 #4d2600, 0 20px 30px rgba(0, 0, 0, 0.5); }
.menu-btn.play:active { transform: translateY(8px); box-shadow: 0 2px 0 #4d2600; }

/* ==========================================
   MOBILE FIXES (Screens smaller than 600px)
   ========================================== */
@media (max-width: 600px) {
  .logo-wrapper { transform: translateX(0); } /* Center logo on mobile */
  .logo-main { max-width: 80vw; }
  .v2-badge { width: 35%; right: -5%; }
  
  .menu-btn.play {
    max-width: 240px; /* Shrinks button for phones */
    height: 60px;
    font-size: 26px;
    border-width: 3px;
  }
}

/* --- ANIMATION KEYFRAMES --- */
@keyframes crashSlam {
  0% { transform: translateY(-800px) scaleY(2); opacity: 0; }
  60% { transform: translateY(0) scaleY(0.7); opacity: 1; }
  100% { transform: translateY(0) scaleY(1); opacity: 1; }
}
@keyframes stampV2 {
  0% { transform: scale(4) rotate(-20deg); opacity: 0; }
  100% { transform: scale(1) rotate(8deg); opacity: 1; }
}
@keyframes logoSlamShake {
  0%, 100% { transform: translateX(-30px); }
  50% { transform: translateX(-30px) translateY(5px); }
}
@keyframes plaquePop { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

/* THE LOGO WRAPPER - Centered exactly */
.logo-wrapper {
  position: relative;
  display: flex;
  justify-content: center;
  align-items: center;
  width: 100%; /* Ensures it spans the full menu width */
  margin-bottom: 25px;
  z-index: 10;
  
  /* Resetting the offset so it is dead center */
  transform: translateX(0); 
  
  /* Screen shake on impact */
  animation: logoSlamShake 0.2s 0.6s 2; 
}

/* THE MAIN LOGO */
.logo-main {
  width: 90%;          /* Responsive width */
  max-width: 480px;    /* Max size on PC */
  height: auto;
  display: block;
  filter: drop-shadow(0 15px 30px rgba(0,0,0,0.8));
  
  /* Fall and Crash Animation */
  animation: crashSlam 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
}

/* --- ANIMATION KEYFRAMES --- */

@keyframes crashSlam {
  0% { transform: translateY(-800px) scaleY(2); opacity: 0; }
  60% { transform: translateY(0) scaleY(0.7); opacity: 1; } /* Squash */
  85% { transform: translateY(-20px) scaleY(1.1); }          /* Bounce */
  100% { transform: translateY(0) scaleY(1); opacity: 1; }
}

@keyframes logoSlamShake {
  0% { transform: translate(0, 0); }
  50% { transform: translate(8px, 8px); }
  100% { transform: translate(0, 0); }
}

/* MOBILE FIX */
@media (max-width: 600px) {
  .logo-main {
    max-width: 320px; /* Perfectly sized for phones */
  }
}
/* ==========================================
   MOBILE OPTIMIZATION (Screens < 600px)
   ========================================== */
@media (max-width: 600px) {
  #scoreBoard {
    top: 10px;    /* Move closer to edge */
    left: 10px;
    padding: 4px 15px 4px 6px;
    gap: 8px;
    border-width: 2px;
    box-shadow: 0 4px 0 #1a0a00, 0 6px 12px rgba(0, 0, 0, 0.5);
  }

  .score-icon-wrapper {
    width: 34px;  /* Much smaller for mobile */
    height: 34px;
  }

  .score-icon {
    height: 24px;
  }

  #scoreText {
    font-size: 20px; /* Clean and readable but compact */
  }

  #scoreBoard::after {
    top: -8px;
    left: 40px;
    font-size: 8px;
  }
}

/* Animation remains the same */
.score-bump { animation: scorePop 0.2s ease-out; }
@keyframes scorePop {
  0% { transform: scale(1); }
  50% { transform: scale(1.1); }
  100% { transform: scale(1); }
}

/* ==========================================
   GAME FRAME & HEADER
   ========================================== */

/* Subtle inner border for sides and bottom */
.game-frame-overlay {
  position: absolute;
  top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none;
  border-left: 8px solid rgba(250, 204, 21, 0.2);
  border-right: 8px solid rgba(250, 204, 21, 0.2);
  border-bottom: 8px solid rgba(250, 204, 21, 0.2);
  box-shadow: inset 0 0 50px rgba(0,0,0,0.5);
  z-index: 100;
}

/* THICK STYLISH TOP BAR */
.game-header {
  position: absolute;
  top: 0; left: 0; width: 100%;
  height: 60px; /* Thick top bar */
  background: linear-gradient(to bottom, #4d2600, #261300);
  border-bottom: 4px solid #facc15;
  box-shadow: 0 10px 20px rgba(0,0,0,0.6);
  display: flex;
  justify-content: center;
  z-index: 101;
}

/* THE "SHIELD" SCOREBOARD (Centred and jutting out) */
#scoreBoard {
  position: absolute;
  top: 0; /* Starts at the very top */
  
  /* The "Vibe": Not symmetrical and going out */
  height: 95px; /* Taller than the header so it hangs out */
  min-width: 180px;
  background: linear-gradient(135deg, #facc15 0%, #ffaa00 100%);
  
  /* Sick Asymmetrical Shield Shape */
  clip-path: polygon(0% 0%, 100% 0%, 100% 70%, 50% 100%, 0% 85%);
  
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  padding: 0 20px 15px 20px; /* Padding bottom so text sits higher than the point */
  
  border-bottom: 4px solid #ffffff;
  filter: drop-shadow(0 10px 10px rgba(0,0,0,0.5));
  z-index: 102;
}

/* Adjusting elements inside the new shield */
.score-icon-wrapper {
  background: #1a0a00;
  border: 2px solid #ffffff;
  border-radius: 50%;
  width: 45px;
  height: 45px;
  display: flex;
  justify-content: center;
  align-items: center;
}

#scoreText {
  font-family: 'Orbitron', sans-serif;
  font-size: 32px;
  font-weight: 900;
  color: #1a0a00; /* Dark text on the yellow shield */
  text-shadow: 1px 1px 0px rgba(255,255,255,0.5);
}

/* SCORE LABEL (Placed on the wooden header beam) */
.game-header::before {
  content: "RECORDING SCORE...";
  position: absolute;
  left: 25px;
  top: 50%;
  transform: translateY(-50%);
  color: #facc15;
  font-size: 12px;
  letter-spacing: 2px;
  font-family: 'Orbitron', sans-serif;
  opacity: 0.6;
}

/* ==========================================
   MOBILE SCALING
   ========================================== */
@media (max-width: 600px) {
  .game-header { height: 45px; }
  
  #scoreBoard {
    height: 70px;
    min-width: 140px;
    clip-path: polygon(0% 0%, 100% 0%, 100% 75%, 50% 100%, 0% 88%);
    padding: 0 10px 10px 10px;
  }
  
  #scoreText { font-size: 22px; }
  .score-icon-wrapper { width: 35px; height: 35px; }
  .score-icon { height: 25px; }
  .game-header::before { display: none; } /* Hide text on mobile to save space */
}
  </style>
</head>
<body>

  <!-- ==========================================
       MODALS (OVERLAYS)
       ========================================== -->
  
  <!-- MODAL: LOGIN VIA GOOGLE -->
  <div id="loginModal" class="modal-overlay">
    <div class="modal-box">
      <h2>CONECTARE</h2>
      <p>Trebuie să te conectezi pentru a salva progresul!</p>
<button class="custom-google-btn" onclick="signInWithGoogle()">
  <i class="fa-brands fa-google"></i>
  <span>LOG IN CU GOOGLE</span>
</button>
      <button class="cancel-btn" onclick="closeLoginModal()">Anulează</button>
    </div>
  </div>

  <!-- MODAL: ALEGERE USERNAME -->
  <div id="usernameModal" class="modal-overlay">
    <div class="modal-box">
      <h2>CREARE CONT</h2>
      <p>Alege-ți un nume de legendă:</p>
      <input type="text" id="usernameInput" class="input-field" placeholder="Ex: KevinBoss" maxlength="15">
      <button class="menu-btn play" style="width: 100%; font-size: 24px; padding: 10px;" onclick="saveNewUsername()">SALVEAZĂ</button>
    </div>
  </div>

  <!-- MODAL: LOADING -->
  <div id="loadingModal" class="modal-overlay">
    <div class="modal-box" style="border-color: #0eddc1; box-shadow: 0 0 30px rgba(14, 221, 193, 0.4);">
      <h2 style="color: #0eddc1;">SE ÎNCARCĂ...</h2>
      <p>Sincronizare cu serverul...</p>
    </div>
  </div>

  <!-- ==========================================
       MAIN MENU
       ========================================== -->
  <div id="mainMenu">
    <!-- Fundal particule -->
    <div class="particles-container" id="particles"></div>

<div class="logo-wrapper">
  <img class="logo-main" src="https://iili.io/CNVgL7a.png" alt="PRINDEL PE KEVINUȚĂ">
</div>    
    <div id="welcomeText">Salut, Jucătorule!</div>

    <div class="button-container">
      <button class="menu-btn play" onclick="handlePlayClick()">
        <i class="fa-solid fa-play"></i>
        <span>PLAY</span>
      </button> <!-- Added missing </button> -->

      <button id="logoutBtn" onclick="logoutGoogle()">
        <i class="fa-solid fa-right-from-bracket"></i>
        <span>LOG OUT</span>
      </button>
    </div> <!-- Added missing </div> for button-container -->
  </div> <!-- Added missing </div> for mainMenu -->

  <!-- ==========================================
       GAME AREA
       ========================================== -->
<div id="gameArea">
  <!-- Subtile side/bottom frame -->
  <div class="game-frame-overlay"></div>

  <!-- Thick Stylish Top Bar -->
  <div class="game-header">
    <div id="scoreBoard">
      <div class="score-icon-wrapper">
        <img src="https://images.squarespace-cdn.com/content/v1/68026d02ef3401024739f55f/3838e9be-f08a-4e78-815f-4b1688594e17/ce291931-bdae-4385-a65e-fea28b922266_removalai_preview.png?format=500w" class="score-icon" alt="Avatar">
      </div>
      <span id="scoreText">0</span>
    </div>
  </div>

  <div id="kevin"></div>
  <button id="backBtn" onclick="returnToMenu()">Înapoi la Meniu</button>
</div>
  <!-- ==========================================
       JAVASCRIPT
       ========================================== -->
  <script>
const particlesContainer = document.getElementById('particles');
const particleCount = 40;

for (let i = 0; i < particleCount; i++) {
  let p = document.createElement('div');
  p.className = 'particle';
  
  // Randomize size
  let size = Math.random() * 4 + 2;
  p.style.width = size + 'px';
  p.style.height = size + 'px';
  
  // Randomize horizontal position
  p.style.left = Math.random() * 100 + 'vw';
  
  // Speed and Delay
  let duration = Math.random() * 5 + 5; // 5 to 10 seconds
  let delay = Math.random() * 5;
  
  p.style.animationDuration = duration + 's';
  p.style.animationDelay = '-' + delay + 's'; // The "-" makes them start "mid-way" so they aren't stuck at the bottom/top on load
  
  particlesContainer.appendChild(p);
}

    // =====================================
    // FIREBASE INITIALIZATION
    // =====================================
    const firebaseConfig = {
      apiKey: "AIzaSyBihv3wYvDUo6DejSLec9U0DfOiR6g7VuQ",
      authDomain: "kevin-game-f9cf8.firebaseapp.com",
      projectId: "kevin-game-f9cf8",
      storageBucket: "kevin-game-f9cf8.firebasestorage.app",
      messagingSenderId: "867549783547",
      appId: "1:867549783547:web:b12b915b2ed3129907175e"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const googleProvider = new firebase.auth.GoogleAuthProvider();

    // =====================================
    // VARIABILE GLOBALE
    // =====================================
    let currentUID = null;
    let currentUsername = "";
    let score = 0;
    let lastSavedScore = 0;
    
    let comboCount = 0;
    let comboTimer = null;
    let moveKevinInterval = null;
    let tiredTimeout = null;
    let saveScoreInterval = null;
    let isKevinTired = false;
    let canClickKevin = true; 

    const normalKevinImage = "url('https://images.squarespace-cdn.com/content/v1/68026d02ef3401024739f55f/192e30da-bdaa-47cc-9de6-472d696fa466/KEVINUTA+13-Photoroom.png?format=500w')";
    const tiredKevinImage = "url('https://images.squarespace-cdn.com/content/v1/68026d02ef3401024739f55f/0b5ac0f4-618a-4346-9684-8c1f3c0a5fcb/20716c49-4365-417d-97e9-fc8601ae5403_removalai_preview.png?format=500w')";

    // =====================================
    // AUTHENTICATION & UI FLOW
    // =====================================
    auth.onAuthStateChanged(async (user) => {
      if (user) {
        currentUID = user.uid;
        await checkUserInFirestore(currentUID);
      } else {
        currentUID = null;
        currentUsername = "";
        showLoggedOutUI();
      }
    });

    function handlePlayClick() {
      if (currentUID) {
        startGameUI();
      } else {
        document.getElementById('loginModal').style.display = 'flex';
      }
    }

    function closeLoginModal() {
      document.getElementById('loginModal').style.display = 'none';
    }

    function signInWithGoogle() {
      document.getElementById('loginModal').style.display = 'none';
      document.getElementById('loadingModal').style.display = 'flex';
      auth.signInWithPopup(googleProvider).catch((error) => {
        console.error("Eroare la logare:", error);
        alert("Eroare la logare Google!");
        document.getElementById('loadingModal').style.display = 'none';
      });
    }

    function logoutGoogle() {
      auth.signOut().then(() => {
        showLoggedOutUI();
      });
    }

    async function checkUserInFirestore(uid) {
      document.getElementById('loadingModal').style.display = 'flex';
      try {
        const docRef = db.collection("players").doc(uid);
        const docSnap = await docRef.get();

        if (docSnap.exists) {
          const data = docSnap.data();
          currentUsername = data.username;
          score = data.score || 0;
          lastSavedScore = score;
          
          document.getElementById('loadingModal').style.display = 'none';
          showLoggedInUI();
        } else {
          document.getElementById('loadingModal').style.display = 'none';
          document.getElementById('usernameModal').style.display = 'flex';
        }
      } catch (e) {
        console.error("Eroare Firestore:", e);
        document.getElementById('loadingModal').style.display = 'none';
      }
    }

    async function saveNewUsername() {
      const input = document.getElementById('usernameInput').value.trim();
      if (input.length < 3) {
        alert("Numele trebuie să aibă minim 3 caractere!");
        return;
      }

      document.getElementById('usernameModal').style.display = 'none';
      document.getElementById('loadingModal').style.display = 'flex';

      try {
        const querySnapshot = await db.collection("players").where("username", "==", input).get();
        if (!querySnapshot.empty) {
          alert("Numele este deja luat! Alege altul.");
          document.getElementById('loadingModal').style.display = 'none';
          document.getElementById('usernameModal').style.display = 'flex';
          return;
        }

        currentUsername = input;
        score = 0;
        lastSavedScore = 0;

        await db.collection("players").doc(currentUID).set({
          uid: currentUID,
          username: currentUsername,
          score: 0,
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });

        document.getElementById('loadingModal').style.display = 'none';
        showLoggedInUI();
      } catch (e) {
        console.error("Eroare creare cont:", e);
        alert("Eroare. Încearcă din nou.");
        document.getElementById('loadingModal').style.display = 'none';
      }
    }

    function showLoggedInUI() {
      document.getElementById('loginModal').style.display = 'none';
      const welcomeText = document.getElementById('welcomeText');
      const logoutBtn = document.getElementById('logoutBtn');
      
      welcomeText.innerText = `SALUT, ${currentUsername}!`;
      welcomeText.style.display = 'block';
      logoutBtn.style.display = 'block';
    }

    function showLoggedOutUI() {
      document.getElementById('welcomeText').style.display = 'none';
      document.getElementById('logoutBtn').style.display = 'none';
    }

function startGameUI() {
  document.getElementById('mainMenu').style.display = 'none';
  document.getElementById('gameArea').style.display = 'block';

  comboCount = 0;
  updateScoreUI();
  
  const kevin = document.getElementById('kevin');
  kevin.style.backgroundImage = normalKevinImage;
  
  // Force Kevin to be visible and have a starting size
  kevin.style.width = "120px";
  kevin.style.height = "120px";
  
  isKevinTired = false;

  moveKevinAway(); // Initial jump
  startKevinMovement();
  startTiredCycle();

  saveScoreInterval = setInterval(syncScoreToFirestore, 5000);
}

    async function syncScoreToFirestore() {
      if (currentUID && score !== lastSavedScore) {
        lastSavedScore = score;
        try {
          await db.collection("players").doc(currentUID).update({
            score: score,
            lastActive: firebase.firestore.FieldValue.serverTimestamp()
          });
        } catch (e) {}
      }
    }

    async function returnToMenu() {
      clearInterval(moveKevinInterval);
      clearTimeout(tiredTimeout);
      clearInterval(saveScoreInterval);

      await syncScoreToFirestore();

      document.getElementById('gameArea').style.display = 'none';
      document.getElementById('mainMenu').style.display = 'flex';
    }

function updateScoreUI() {
  const sb = document.getElementById('scoreBoard');
  const st = document.getElementById('scoreText');
  
  st.innerText = score;

  // Add the bump animation class
  sb.classList.remove('score-bump');
  void sb.offsetWidth; // This is a "hack" to reset the animation
  sb.classList.add('score-bump');
}
    // =====================================
    // GAMEPLAY LOGIC
    // =====================================
    function startKevinMovement() {
      if (moveKevinInterval) clearInterval(moveKevinInterval);
      moveKevinInterval = setInterval(() => {
        moveKevinAway();
      }, 1500);
    }

    function moveKevinAway() {
      if (isKevinTired) return;

      const kevin = document.getElementById('kevin');
      const gameArea = document.getElementById('gameArea');

      const maxX = gameArea.clientWidth - kevin.offsetWidth;
      const maxY = gameArea.clientHeight - kevin.offsetHeight;
      
      let newX = Math.random() * maxX;
      let newY = Math.random() * maxY;

      if(newY < 80 && newX < 200) newY += 80;

      kevin.style.left = `${newX}px`;
      kevin.style.top = `${newY}px`;
    }

    function startTiredCycle() {
      clearTimeout(tiredTimeout);
      tiredTimeout = setTimeout(() => {
        const kevin = document.getElementById('kevin');
        isKevinTired = true;
        kevin.style.backgroundImage = tiredKevinImage;
        
        setTimeout(() => {
          isKevinTired = false;
          kevin.style.backgroundImage = normalKevinImage;
          moveKevinAway(); 
          startTiredCycle();
        }, 5000);
      }, 60000);
    }

    document.getElementById('kevin').addEventListener('click', (e) => {
      e.stopPropagation(); 
      if (!canClickKevin) return;
      canClickKevin = false;

      score++;
      updateScoreUI();

      comboCount++;
      showComboText(e.clientX, e.clientY, comboCount);

      clearTimeout(comboTimer);
      comboTimer = setTimeout(() => { comboCount = 0; }, 2000);

      if (!isKevinTired) {
        moveKevinAway();
        startKevinMovement(); 
      }

      setTimeout(() => { canClickKevin = true; }, 100); 
    });

    function showComboText(x, y, count) {
      const el = document.createElement("div");
      el.className = "combo-text";
      el.textContent = `x${count}`;
      el.style.left = `${x}px`;
      el.style.top = `${y}px`;
      document.body.appendChild(el);

      setTimeout(() => {
        el.style.transform = "translate(-50%, -150px) scale(1.5)";
        el.style.opacity = "0";
      }, 10);
      setTimeout(() => { el.remove(); }, 1200);
    }
  </script>
